<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For KoKo</title>
    <style>
        /* ၁။ တစ်မျက်နှာလုံး အပြည့် Layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4;
        }

        #text-container {
            position: absolute;
            z-index: 10;
            text-align: center;
        }

        #animated-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.8), 0 0 20px rgba(255, 51, 102, 0.8);
        }

        /* 📱 ဖုန်းပေါ်မှာ နှလုံးသားပုံစံ ကွက်တိ ဖြစ်စေရန် အဓိကပြင်ဆင်ချက် */
        #heart-collage-container {
            position: relative;
            width: 340px;  /* ဖုန်း Screen တိုင်းနဲ့ ဆံ့အောင် Width ကို ပုံသေ 340px ပေးလိုက်ပါတယ် */
            height: 380px; /* Height ကိုလည်း သင့်တော်ရုံ ထိန်းထားပါတယ် */
            z-index: 5;
        }

        /* ဓာတ်ပုံတစ်ပုံချင်းစီကို စနစ်တကျ Absolute နေရာချခြင်း */
        .collage-photo {
            position: absolute; 
            width: 55px;   /* ပုံအရွယ်အစားကို ဖုန်းနဲ့ လိုက်ဖက်အောင် ၅၅ ပစ်ဆယ် ပေးထားပါတယ် */
            height: 55px;
            object-fit: cover;
            border-radius: 8px;
            border: 1.5px solid #ffffff;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.5);
            
            /* အစမှာ အလယ်ဗဟို (နှလုံးသားရဲ့ အလယ်ခေါင်) မှာ အကုန်စုနေပါမယ် */
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ဖြန့်ထွက်လာချိန်တွင် အလုပ်လုပ်မည့် CSS */
        .collage-photo.active {
            opacity: 1;
            transform: scale(1);
        }

        /* အသည်းပုံရဲ့ အလယ်ခေါင်က စာသား */
        #center-wish {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366;
            opacity: 0;
            transition: all 1s ease 1.2s;
            z-index: 6;
            width: 150px;
            line-height: 1.4;
        }

        #center-wish.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="text-container">
        <h1 id="animated-text">READY?</h1>
    </div>

    <div id="heart-collage-container" class="hidden">
        <div id="center-wish">Happy 1 Month Anniversary ❤️</div>
        
        <img class="collage-photo" src="kk1.jpg">
        <img class="collage-photo" src="kk2.jpg">
        <img class="collage-photo" src="kk3.jpg">
        <img class="collage-photo" src="kk4.jpg">
        <img class="collage-photo" src="kk5.jpg">
        <img class="collage-photo" src="kk6.jpg">
        <img class="collage-photo" src="kk7.jpg">
        <img class="collage-photo" src="kk8.jpg">
        <img class="collage-photo" src="kk9.jpg">
        <img class="collage-photo" src="kk10.jpg">
        <img class="collage-photo" src="kk11.jpg">
        <img class="collage-photo" src="kk12.jpg">
        <img class="collage-photo" src="kk13.jpg">
        <img class="collage-photo" src="kk14.jpg"><img class="collage-photo" src="kk15.jpg">
        <img class="collage-photo" src="kk16.jpg">
        <img class="collage-photo" src="kk17.jpg">
        <img class="collage-photo" src="kk18.jpg">
        <img class="collage-photo" src="kk19.jpg">
        <img class="collage-photo" src="kk20.jpg">
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const alphabet = '0123456789❤️✨🌸'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff3366';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // Text Animation Logic
        const words = ["3", "2", "1", "HAPPY", "ONE MONTH", "ANNIVERSARY", "TO", "MY LOVE", "❤️"];
        let wordIndex = 0;
        const animatedText = document.getElementById("animated-text");

        function showWords() {
            if (wordIndex < words.length) {
                animatedText.innerText = words[wordIndex];
                wordIndex++;
                setTimeout(showWords, 1200);
            } else {
                document.getElementById("text-container").classList.add("hidden");
                document.getElementById("heart-collage-container").classList.remove("hidden");
                setTimeout(generateHeartShape, 200);
            }
        }

        // 📱 ဖုန်း Screen 340px x 380px အပေါ်မူတည်ပြီး တိကျစွာ တွက်ချက်ထားသော Pixel တည်နေရာများ
        const heartCoordinates = [
            {x: 170, y: 100}, // အပေါ်မြောင်းအလယ်
            {x: 125, y: 70},  {x: 215, y: 70},
            {x: 80,  y: 65},  {x: 260, y: 65},
            {x: 40,  y: 90},  {x: 300, y: 90},
            {x: 20,  y: 135}, {x: 320, y: 135},
            {x: 22,  y: 185}, {x: 318, y: 185},
            {x: 45,  y: 235}, {x: 295, y: 235},
            {x: 80,  y: 280}, {x: 260, y: 280},
            {x: 115, y: 315}, {x: 225, y: 315},
            {x: 145, y: 345}, {x: 195, y: 345},
            {x: 170, y: 365}  // အောက်ခြေအချွန်ဆုံး
        ];

        function generateHeartShape() {
            const photos = document.querySelectorAll('.collage-photo');
            photos.forEach((photo, index) => {
                if(heartCoordinates[index]) {
                    // ပုံရဲ့ ၅၅px ရဲ့ တစ်ဝက်ဖြစ်တဲ့ ၂၇.၅px ကို နှုတ်ပြီး ဗဟိုညှိထားပါတယ်
                    photo.style.left = (heartCoordinates[index].x - 27.5) + 'px';
                    photo.style.top = (heartCoordinates[index].y - 27.5) + 'px';
                    setTimeout(() => { photo.classList.add('active'); }, index * 60); 
                }
            });
            setTimeout(() => { document.getElementById('center-wish').classList.add('show'); }, 1800);
        }

        window.onload = function() { setTimeout(showWords, 1000); };
    </script>
</body>
</html>
